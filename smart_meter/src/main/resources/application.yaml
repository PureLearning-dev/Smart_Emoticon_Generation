server:
  port: 8080

spring:
  application:
    name: smart_meter

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smart_meter?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 200481lj

  # MyBatis-Plus 全局配置
  mybatis-plus:
    configuration:
      # 在控制台打印 SQL 语句，方便调试
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
      # 开启驼峰命名转换（例如：user_name -> userName）
      map-underscore-to-camel-case: true
    global-config:
      db-config:
        # 主键策略：自增
        id-type: auto


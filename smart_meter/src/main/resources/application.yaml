server:
  port: 8080

spring:
  application:
    name: smart_meter

  # 参考图上传需放宽 multipart 限制（与业务层 10MB 一致）
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smart_meter_system?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root

# MyBatis-Plus 全局配置
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.purelearning.smart_meter.entity
  configuration:
    # 在控制台打印 SQL 语句，方便调试
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 开启驼峰命名转换（例如：user_name -> userName）
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 主键策略：自增
      id-type: auto

# Python AI 服务地址（用于联调）
# read-timeout-ms：调用 ai-kore 离线入库 / 搜图等 HTTP 读超时；爬虫管线含下载、OSS、CLIP、PaddleOCR，首次 OCR 可能数分钟，过短易出现 Unexpected end of file from server
ai-kore:
  base-url: http://127.0.0.1:8000
  connect-timeout-ms: 15000
  read-timeout-ms: 600000

# 微信小程序登录（jscode2session）
wechat:
  miniapp:
    appid: ${WECHAT_MINIAPP_APPID:}
    secret: ${WECHAT_MINIAPP_SECRET:}

# JWT 配置（用于登录态）
jwt:
  secret: ${JWT_SECRET:}
  ttl-seconds: 604800